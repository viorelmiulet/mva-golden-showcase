[build]
  publish = "dist"
  command = "npm run build"

# Slug 301 redirects – run BEFORE prerender so bots get the canonical URL
[[edge_functions]]
  function = "slug-redirect"
  path = "/proprietati/*"

[[edge_functions]]
  function = "slug-redirect"
  path = "/proprietate/*"

# Prerender.io – intercept bot requests
[[edge_functions]]
  function = "prerender"
  path = "/*"


[[edge_functions]]
  function = "og-crawler"
  path = "/proprietate/*"

[[edge_functions]]
  function = "og-crawler"
  path = "/proprietati/*"

[[edge_functions]]
  function = "og-crawler"
  path = "/complexe/*"

[[edge_functions]]
  function = "og-crawler"
  path = "/blog/*"

[[edge_functions]]
  function = "og-crawler"
  path = "/news/*"

[[redirects]]
  from = "/sitemap.xml"
  to = "https://fdpandnzblzvamhsoukt.supabase.co/functions/v1/generate-sitemap"
  status = 200
  force = true

[[redirects]]
  from = "/news-sitemap.xml"
  to = "https://fdpandnzblzvamhsoukt.supabase.co/functions/v1/generate-news-sitemap"
  status = 200
  force = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
