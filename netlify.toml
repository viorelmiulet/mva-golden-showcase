[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/sitemaps/static.xml"
  to = "https://fdpandnzblzvamhsoukt.supabase.co/functions/v1/generate-sitemap-static"
  status = 200
  force = true

[[redirects]]
  from = "/sitemaps/properties.xml"
  to = "https://fdpandnzblzvamhsoukt.supabase.co/functions/v1/generate-sitemap-properties"
  status = 200
  force = true

[[redirects]]
  from = "/sitemaps/complexes.xml"
  to = "https://fdpandnzblzvamhsoukt.supabase.co/functions/v1/generate-sitemap-complexes"
  status = 200
  force = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
