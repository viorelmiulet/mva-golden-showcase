[build]
  publish = "dist"
  command = "npm run build"

# Slug 301 redirects – run BEFORE prerender so bots get the canonical URL
[[edge_functions]]
  function = "slug-redirect"
  path = "/proprietati/*"

[[edge_functions]]
  function = "slug-redirect"
  path = "/proprietate/*"

# OG crawler – MUST run BEFORE prerender so social bots get dynamic OG tags
[[edge_functions]]
  function = "og-crawler"
  path = "/proprietate/*"

[[edge_functions]]
  function = "og-crawler"
  path = "/proprietati/*"

[[edge_functions]]
  function = "og-crawler"
  path = "/complexe/*"

[[edge_functions]]
  function = "og-crawler"
  path = "/blog/*"

[[edge_functions]]
  function = "og-crawler"
  path = "/news/*"

# Prerender.io – intercept remaining bot requests for SEO
[[edge_functions]]
  function = "prerender"
  path = "/*"

