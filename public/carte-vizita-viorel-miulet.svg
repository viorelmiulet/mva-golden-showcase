        <rect x="25" y="36" width="1" height="1"/>
      </g>
      <!-- WhatsApp logo in center -->
      <circle cx="20" cy="20" r="4" fill="#25D366"/>
      <path d="M18 17 C18 16 19 15 20 15 C21 15 22 16 22 17 C22 18 21 19 20 19 C19.5 19 19 18.5 19 18 L19 19 C19 20 18.5 20.5 18 20.5 C17.5 20.5 17 20 17 19.5 L17 17.5 C17 16.5 17.5 16 18 16 Z" fill="white" transform="scale(0.8) translate(2.5, 2.5)"/>
    </g>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="320" cy="40" r="2" fill="url(#logoGradientCard)" opacity="0.3"/>
  <circle cx="310" cy="170" r="1.5" fill="url(#logoGradientCard)" opacity="0.2"/>
  <circle cx="330" cy="160" r="1" fill="#D4AF37" opacity="0.4"/>
  
  <!-- Bottom decorative line -->
