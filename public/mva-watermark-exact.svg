<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Logo gradients with transparency -->
    <linearGradient id="luxuryGradientWM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.7" />
      <stop offset="25%" stop-color="#FFD700" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#F4E5B1" stop-opacity="0.6" />
      <stop offset="75%" stop-color="#FFD700" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#B8860B" stop-opacity="0.7" />
    </linearGradient>
    
    <linearGradient id="innerGradientWM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#2D2D2D" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#1A1A1A" stop-opacity="0.4" />
    </linearGradient>
    
    <!-- Text gradients with transparency -->
    <linearGradient id="textGradientWM" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#F4E5B1" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0.8" />
    </linearGradient>
    
    <!-- Subtle glow effects -->
    <filter id="luxuryGlowWM" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="innerShadowWM">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000000" flood-opacity="0.2"/>
      <feComposite operator="in" in2="inverse"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Main logo centered -->
  <g transform="translate(256, 200)">
    <!-- Outer luxury ring -->
    <circle 
      cx="0" 
      cy="0" 
      r="96" 
      fill="none"
      stroke="url(#luxuryGradientWM)"
      stroke-width="8"
      opacity="0.6"
      filter="url(#luxuryGlowWM)"
    />
    
    <!-- Main luxury hexagon -->
    <path 
      d="M0 -92 L79.75 -46 L79.75 46 L0 92 L-79.75 46 L-79.75 -46 Z" 
      fill="url(#luxuryGradientWM)" 
      opacity="0.7"
      filter="url(#luxuryGlowWM)"
    />
    
    <!-- Inner dark background -->
    <path 
      d="M0 -76 L65.75 -38 L65.75 38 L0 76 L-65.75 38 L-65.75 -38 Z" 
      fill="url(#innerGradientWM)"
      filter="url(#innerShadowWM)"
    />
    
    <!-- Premium "M" letterform -->
    <path 
      d="M-36 -28 L-21 -28 L0 12 L21 -28 L36 -28 L36 28 L24 28 L24 -12 L9 20 L-9 20 L-24 -12 L-24 28 L-36 28 Z"
      fill="url(#luxuryGradientWM)"
      filter="url(#luxuryGlowWM)"
    />
    
    <!-- Luxury corner accents -->
    <circle cx="65.75" cy="-38" r="6" fill="#FFD700" opacity="0.5" />
    <circle cx="-65.75" cy="38" r="4" fill="#D4AF37" opacity="0.4" />
    <polygon points="71.75,38 77.75,32 77.75,44" fill="#B8860B" opacity="0.3" />
  </g>
  
  <!-- MVA Text below logo -->
  <text x="256" y="330" 
        font-family="Cinzel, serif" 
        font-size="48" 
        font-weight="bold" 
        fill="url(#textGradientWM)" 
        text-anchor="middle"
        letter-spacing="3px"
        filter="url(#luxuryGlowWM)">MVA</text>
  
  <!-- IMOBILIARE text -->
  <text x="256" y="360" 
        font-family="Playfair Display, serif" 
        font-size="12" 
        font-weight="500" 
        fill="#8B8B8B" 
        fill-opacity="0.6"
        text-anchor="middle"
        letter-spacing="4px">IMOBILIARE</text>
  
  <!-- Premium Real Estate -->
  <text x="256" y="380" 
        font-family="Playfair Display, serif" 
        font-size="10" 
        font-weight="400" 
        fill="#666666" 
        fill-opacity="0.5"
        text-anchor="middle"
        letter-spacing="2px">Premium Real Estate</text>
  
  <!-- Decorative line -->
  <line x1="180" y1="365" x2="332" y2="365" stroke="url(#luxuryGradientWM)" stroke-width="1" opacity="0.4"/>
</svg>