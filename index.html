    <script>
      (() => {
        const siteUrl = 'https://mvaimobiliare.ro';
        const rawPath = window.location.pathname || '/';
        const normalizedPath = rawPath === '/' ? '/' : rawPath.replace(/\/+$/, '');
        const currentUrl = `${siteUrl}${normalizedPath}`;

        const setContent = (selector, attribute, value) => {
          const element = document.querySelector(selector);
          if (element) {
            element.setAttribute(attribute, value);
          }
        };

        if (!normalizedPath.startsWith('/admin') && !normalizedPath.startsWith('/api')) {
          setContent('link[rel="canonical"]', 'href', currentUrl);
          setContent('meta[property="og:url"]', 'content', currentUrl);
          setContent('meta[name="twitter:url"]', 'content', currentUrl);
        }
      })();
