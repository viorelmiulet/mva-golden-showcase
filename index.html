    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    
    // Configure Tawk to minimize all content
    Tawk_API.customStyle = {
        visibility : {
            desktop : {
                position : 'br',
                xOffset : 20,
                yOffset : 20
            },
            mobile : {
                position : 'br',
                xOffset : 10,
                yOffset : 10
            }
        },
        widget : {
            color : {
                theme : '00A652',
                launcherText : '#FFFFFF'
            }
        }
    };
    
    // Add CSS to hide all text and keep only the dot
    var style = document.createElement('style');
    style.textContent = `
        /* Hide all Tawk text content */
        [data-testid="chat-bubble-text"],
        .tawk-text-regular-md,
        .tawk-text-regular-sm,
        .tawk-text-bold-md,
        .tawk-flex-column .tawk-text-regular-md,
        .tawk-flex-column .tawk-text-regular-sm {
            display: none !important;
        }
        
        /* Hide emoticons and images except status indicator */
        #tawk-bubble img:not([alt*="online"]),
        #tawk-bubble svg:not([data-testid*="indicator"]) {
            display: none !important;
        }
        
        /* Make bubble smaller - just the green dot */
        #tawk-bubble {
            width: 20px !important;
            height: 20px !important;
            border-radius: 50% !important;
        }
        
        /* Hide the entire message container */
        .tawk-flex.tawk-flex-column.tawk-justify-center {
            display: none !important;
        }
        
        /* Keep only the online indicator */
        .tawk-online-indicator {
            display: block !important;
        }
    `;
    document.head.appendChild(style);
    
    Tawk_API.onLoad = function(){
        // Additional hiding after load
        setTimeout(function() {
            var bubbles = document.querySelectorAll('[data-testid="chat-bubble"]');
            bubbles.forEach(function(bubble) {
                var textElements = bubble.querySelectorAll('*');
                textElements.forEach(function(el) {
                    if (el.textContent && el.textContent.trim() && !el.querySelector('.tawk-online-indicator')) {
                        el.style.display = 'none';
                    }
                });
            });
        }, 1000);
    };
