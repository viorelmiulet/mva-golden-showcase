<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MVA Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }
    
    .header {
      padding: 16px;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #d4af37, #b8962e);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      color: #1a1a2e;
    }
    
    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      color: #d4af37;
    }
    
    .header-text p {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .content {
      padding: 16px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    
    .stat-card .icon {
      font-size: 24px;
      margin-bottom: 4px;
    }
    
    .stat-card .value {
      font-size: 24px;
      font-weight: 700;
      color: #d4af37;
    }
    
    .stat-card .label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #d4af37, #b8962e);
      color: #1a1a2e;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin-bottom: 12px;
    }
    
    .toggle-label {
      font-size: 13px;
    }
    
    .toggle {
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .toggle.active {
      background: #d4af37;
    }
    
    .toggle::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    
    .toggle.active::after {
      transform: translateX(20px);
    }
    
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .loading {
      display: none;
      text-align: center;
      padding: 8px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
    }
    
    .loading.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">MVA</div>
    <div class="header-text">
      <h1>MVA Admin</h1>
      <p>Panou de administrare</p>
    </div>
  </div>
  
  <div class="content">
    <div class="stats">
      <div class="stat-card">
        <div class="icon">📅</div>
        <div class="value" id="viewingsCount">-</div>
        <div class="label">Vizionări azi</div>
      </div>
      <div class="stat-card">
        <div class="icon">👤</div>
        <div class="value" id="clientsCount">-</div>
        <div class="label">Clienți noi</div>
      </div>
    </div>
    
    <div class="toggle-row">
      <span class="toggle-label">🔔 Notificări active</span>
      <div class="toggle active" id="notificationsToggle"></div>
    </div>
    
    <div class="actions">
      <button class="btn btn-primary" id="openAdmin">
        🏠 Deschide Panoul Admin
      </button>
      <button class="btn btn-secondary" id="checkNow">
        🔄 Verifică acum
      </button>
    </div>
    
    <div class="loading" id="loading">Se încarcă...</div>
  </div>
  
  <div class="footer">
    Ultima verificare: <span id="lastCheck">-</span>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
